name: Deploy Website to Azure Static Web Apps

on:
  push:
    branches:
      - dev
    paths:
      - 'cs-antiques-website/**'
      - '.github/workflows/deploy-website.yml'

env:
  AZURE_DEPLOYMENT_NAME: cs-antiques-website
  NODE_VERSION: '22.x'
  REACT_APP_API_URL: 'https://cs-antiques-api-prod-b7hrbmgvhkerc2aa.eastasia-01.azurewebsites.net'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./cs-antiques-website
        run: npm install

      - name: Lint
        working-directory: ./cs-antiques-website
        run: npm run lint

      - name: Build
        working-directory: ./cs-antiques-website
        run: npm run build
        env:
          VITE_API_URL: ${{ env.REACT_APP_API_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "cs-antiques-website/dist"
          api_location: "api"
          output_location: "dist"
